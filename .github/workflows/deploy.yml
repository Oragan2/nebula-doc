name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main  # Runs every time you push to the main branch

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          # Fetch and install the latest mdBook binary directly
          curl -sSL https://api.github.com/repos/rust-lang/mdBook/releases/latest \
          | grep -o -E '"browser_download_url": "([^"#]+)x86_64-unknown-linux-gnu.tar.gz"' \
          | cut -d'"' -f4 \
          | xargs curl -sSL \
          | tar -xzf - -C /usr/local/bin

      - name: Build the Book
        run: mdbook build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './book' # mdBook outputs static files to the 'book' directory by default

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
